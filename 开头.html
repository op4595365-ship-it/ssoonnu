<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滚动视频</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <div class="preloader"></div>
  <div class="mask1"></div>
  <div class="mask2"></div>
  <div class="line"></div>
  <div class="box" style="opacity: 0; transform: scale(0.8); pointer-events: none;">
    <div class="box-text" id="boxText">千问，帮我渲染并动起来</div>
    <img id="playNextBtn" class="btn-img" src="button.png" alt="播放">
  </div>
  <div class="container">
    <video id="v1" class="video" muted playsinline>
      <source src="手臂相碰2.mp4" type="video/mp4">
    </video>
    <video id="v2" class="video" muted playsinline>
      <source src="碰，车.mp4" type="video/mp4">
    </video>
    <video id="v3" class="video" muted playsinline>
      <source src="渲染到循环.mp4" type="video/mp4">
    </video>
    <video id="v3l" class="video" muted playsinline>
      <source src="循环.mp4" type="video/mp4">
    </video>
    <video id="v4" class="video" muted playsinline>
      <source src="拉近.mp4" type="video/mp4">
    </video>
    <video id="v5" class="video" muted playsinline>
      <source src="车体变形.mp4" type="video/mp4">
    </video>
    <video id="v6" class="video" muted playsinline>
      <source src="车轮变形.mp4" type="video/mp4">
    </video>
    <video id="v7" class="video" muted playsinline>
      <source src="场景变换.mp4" type="video/mp4">
    </video>
    <video id="v8" class="video" muted playsinline>
      <source src="芯片到智驾.mp4" type="video/mp4">
    </video>
    <video id="v9" class="video" muted playsinline>
      <source src="跟随.mp4" type="video/mp4">
    </video>
    <video id="v10" class="video" muted playsinline>
      <source src="结尾.mp4" type="video/mp4">
    </video>
    <div class="text1a">通义万相AI</div>
    <div class="text2a">一镜万象</div>
    <div class="text3a">随心自定义</div>
    <div class="text1b">一键渲染模型</div>
    <div class="text1c">替换主体</div>
    <div class="text1d">优化细节</div>
    <div class="text1e">改变场景</div>
    <div class="text1f">沙漠</div>
    <div class="text1g">森林</div>
    <div class="text1h">动画风格</div>
    <div class="text1i">未来已来，智驾万象</div>
    <div class="text2i">AI 护航，一路从容</div>
    <div class="textj">智启万象，赋能AI新世代</div>
    <div class="prompt">滚动以继续探索</div>
  </div>
    <div class="text-overlay">
      <div class="icon">
        <img src="qwen.png" alt="Qwen Icon">
      </div>
      <div class="text1">Qwen</div>
      <div class="text2">千问</div>
      <div class="text3">智启</div>
      <div class="text4">赋能AI新世代</div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
<script src="script1.js"></script>

</html>
