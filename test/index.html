<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>9:16竖屏视频滚动页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 顶部对齐 */
      background: #000;
      /* 🔥 修复1：删除 overflow:hidden，允许滚动 */
      padding-top: 20px;
    }

    /* 9:16 主容器 */
    .phone-container {
      width: 95vw;
      max-width: 500px;
      aspect-ratio: 9/16;
      position: relative;
      overflow: hidden;
      margin-bottom: 2000px; /* 🔥 修复2：制造滚动高度！数值越大滚得越久 */
    }

    /* 视频样式不变 */
    .video-player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translateZ(0);
      pointer-events: none;
    }

    #video2 {
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div class="phone-container">
    <video id="video1" class="video-player" muted playsinline preload="auto" disablePictureInPicture controlslist="nodownload nofullscreen">
      <source src="手臂相碰2.mp4" type="video/mp4">
    </video>
    <video id="video2" class="video-player" muted playsinline preload="auto" loop disablePictureInPicture controlslist="nodownload nofullscreen">
      <source src="光线铺开.mp4" type="video/mp4">
    </video>
  </div>

<script src="gsap.min.js"></script>
<script src="ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
const video1 = document.getElementById("video1");
const video2 = document.getElementById("video2");
const FRAME_RATE = 30;
let scrollTrigger;

video1.addEventListener("loadedmetadata", () => {
  const videoDuration = video1.duration;
  
  // 🔥 修复3：滚动触发绑定到页面
  scrollTrigger = ScrollTrigger.create({
    trigger: "body",
    start: "top top",
    end: "bottom bottom",
    scrub: 0,
    onUpdate: self => {
      const targetTime = self.progress * videoDuration;
      const totalFrames = Math.round(targetTime * FRAME_RATE);
      const step2Frames = totalFrames - (totalFrames % 2);
      video1.currentTime = step2Frames / FRAME_RATE;
    }
  });
});

// 视频1结束自动播放视频2
video1.addEventListener("ended", () => {
  scrollTrigger.destroy();
  video1.style.opacity = 0;
  video2.style.opacity = 1;
  video2.play();
});
</script>
</body>
</html>
