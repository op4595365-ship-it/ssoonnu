<!DOCTYPE html>

<html class="dark" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>千问启智 - 赋能 AI 新世代</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#070d1f",
                        "on-secondary-fixed-variant": "#5f28c8",
                        "background": "#070d1f",
                        "on-tertiary-container": "#004b58",
                        "secondary-dim": "#8455ef",
                        "on-background": "#dfe4fe",
                        "on-tertiary-fixed-variant": "#005564",
                        "on-primary-fixed-variant": "#005e64",
                        "tertiary": "#8ce7ff",
                        "surface-container-high": "#171f36",
                        "on-surface-variant": "#a5aac2",
                        "tertiary-fixed-dim": "#40ceed",
                        "primary-container": "#00eefc",
                        "tertiary-container": "#53ddfc",
                        "error-container": "#9f0519",
                        "primary": "#8ff5ff",
                        "tertiary-fixed": "#53ddfc",
                        "on-tertiary-fixed": "#003640",
                        "surface-variant": "#1c253e",
                        "on-error-container": "#ffa8a3",
                        "error": "#ff716c",
                        "primary-dim": "#00deec",
                        "on-primary-fixed": "#003f43",
                        "on-primary": "#005d63",
                        "on-secondary": "#280067",
                        "inverse-on-surface": "#4f5469",
                        "on-primary-container": "#005359",
                        "on-secondary-container": "#d9c8ff",
                        "secondary-container": "#5516be",
                        "secondary": "#ac8aff",
                        "inverse-surface": "#faf8ff",
                        "outline": "#6f758b",
                        "secondary-fixed-dim": "#ceb9ff",
                        "surface-container": "#11192e",
                        "primary-fixed": "#00eefc",
                        "inverse-primary": "#006a71",
                        "surface-container-highest": "#1c253e",
                        "surface-tint": "#8ff5ff",
                        "surface-bright": "#222b47",
                        "on-secondary-fixed": "#40009b",
                        "outline-variant": "#41475b",
                        "error-dim": "#d7383b",
                        "on-surface": "#dfe4fe",
                        "on-tertiary": "#005464",
                        "surface-container-low": "#0c1326",
                        "on-error": "#490006",
                        "surface-container-lowest": "#000000",
                        "primary-fixed-dim": "#00deec",
                        "secondary-fixed": "#dac9ff",
                        "surface": "#070d1f",
                        "tertiary-dim": "#40ceed"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUpFadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-50px); }
        }
        @keyframes jumpInRight {
            0% { opacity: 0; transform: translateX(100px) scale(0.8); }
            70% { opacity: 1; transform: translateX(-10px) scale(1.1); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(143, 245, 255, 0.2); }
            50% { box-shadow: 0 0 80px rgba(143, 245, 255, 0.5); }
        }

        .seq-1 { animation: fadeIn 1s ease-out forwards; opacity: 0; }
        .seq-2 { animation: fadeIn 1s ease-out 1.5s forwards; opacity: 0; }
        .seq-3 { animation: slideUpFadeOut 1s ease-in 3.5s forwards; }
        .seq-4 { animation: jumpInRight 1s cubic-bezier(0.22, 1, 0.36, 1) 4.5s forwards; opacity: 0; }
        .seq-5 { animation: fadeIn 1s ease-out 5s forwards; opacity: 0; }

        .glass-panel {
            background: rgba(28, 37, 62, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(143, 245, 255, 0.1) 0%, rgba(7, 13, 31, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body overflow-hidden h-screen w-full flex items-center justify-center relative antialiased">
<!-- Cinematic Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-background"></div>
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-secondary opacity-10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-primary opacity-5 rounded-full blur-[120px]"></div>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Main Viewport (9:16 aspect ratio simulation for desktop preview, full screen on mobile) -->
<div class="relative z-10 w-full max-w-[430px] h-full max-h-[932px] mx-auto flex flex-col items-center justify-center p-8 @container">
<!-- Animation Container -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Phase 1 & 2: Opening Titles -->
<div class="absolute flex flex-col items-center justify-center text-center seq-3 w-full">
<h1 class="font-headline text-5xl md:text-6xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-primary to-primary-dim seq-1 drop-shadow-[0_0_15px_rgba(143,245,255,0.3)] mb-4">
                    千问启智
                </h1>
<p class="font-label text-sm md:text-base text-on-surface-variant uppercase tracking-[0.2em] seq-2">
                    赋能 AI 新世代
                </p>
</div>
<!-- Phase 3: Main AI Interface Reveal -->
<div class="absolute flex flex-col items-center justify-center w-full gap-8">
<!-- AI Icon -->
<div class="seq-4 relative">
<div class="absolute inset-0 bg-primary opacity-20 blur-[60px] rounded-full"></div>
<div class="w-32 h-32 rounded-[2rem] glass-panel border border-outline-variant/15 flex items-center justify-center relative overflow-hidden group shadow-[0_0_40px_rgba(143,245,255,0.1)] transition-all duration-700 hover:shadow-[0_0_80px_rgba(143,245,255,0.3)]" style="animation: pulseGlow 4s infinite alternate, float 6s ease-in-out infinite;">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1;">
                            model_training
                        </span>
<!-- Subtle corner accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-primary/30 rounded-tl-[2rem]"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-primary/30 rounded-br-[2rem]"></div>
</div>
</div>
<!-- AI Name & Action -->
<div class="seq-5 flex flex-col items-center gap-6 w-full mt-4">
<h2 class="font-headline text-4xl font-black tracking-[-0.02em] text-on-surface">千问</h2>
<p class="font-body text-center text-on-surface-variant text-sm px-6">
                        智能边界，由你定义。
                    </p>
<button class="mt-8 relative group overflow-hidden rounded-full w-full max-w-[240px]">
<div class="absolute inset-0 bg-gradient-to-r from-primary to-primary-dim opacity-100 transition-opacity group-hover:opacity-90"></div>
<div class="relative px-8 py-4 flex items-center justify-center gap-2">
<span class="font-label font-bold text-on-primary-fixed tracking-wide">开始探索</span>
<span class="material-symbols-outlined text-on-primary-fixed text-sm">
                                arrow_forward
                            </span>
</div>
</button>
</div>
</div>
</div>
<!-- Shared Bottom Navigation (Hidden initially, appears after animation) -->
<div class="absolute bottom-0 left-0 w-full p-6 seq-5">
<div class="glass-panel border border-outline-variant/15 rounded-full px-6 py-4 flex justify-between items-center shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">explore</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-2xl">chat_bubble</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-2xl">person</span>
</button>
</div>
</div>
</div>
</body></html>
